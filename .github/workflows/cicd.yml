name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  security-sast:
    name: Security Linting (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Security Scanner
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: bandit -r backend/ -x backend/.venv/

  run-api-tests:
    name: Run API Tests (Newman)
    runs-on: ubuntu-latest
    needs: security-sast
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn sqlalchemy pydantic staticfiles
          fi

      - name: Start FastAPI Server
        env:
            DATABASE_URL: "sqlite:///./test_dagbok.db"
            PYTHONPATH: "${{ github.workspace }}/backend"
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &

      - name: API Health Check Verification Loop
        run: |
          echo "Waiting for FastAPI backend to initialize..."
          for i in {1..10}; do
            if curl -s http://127.0.0.1:8000/api/entries > /dev/null; then
              echo "FastAPI is online and healthy."
              exit 0
            fi
            echo "Server not ready yet. Retrying in 2 seconds (Attempt $i/10)..."
            sleep 2
          done
          echo "Error: FastAPI failed to start within the time limit."
          exit 1

      - name: Install Newman CLI
        run: npm install -g newman

      - name: Execute Automated Newman Test Collection
        run: newman run backend/tests/api_collection.json

  deploy:
    name: Continuous Deployment (CD)
    runs-on: ubuntu-latest
    needs: run-api-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name for Docker Compatibility
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/diary-app:latest
            ghcr.io/${{ env.REPO_NAME }}/diary-app:${{ github.sha }}

      - name: Trigger Webhook Deployment
        run: |
          echo "Image corretly published to GHCR."
          # curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
