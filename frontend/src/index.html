<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSecOps Dagbok</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Min Digitala Dagbok</h1>
            <p>DevSecOps VT26 - Inlämningsuppgift</p>
        </header>

        <div id="error-banner" class="error-banner" style="display: none;"></div>

        <main class="main-content">
            <section class="form-section">
                <h2 id="form-title">Skapa ny anteckning</h2>
                <form id="diary-form">
                    <input type="hidden" id="entry-id">
                    
                    <div class="form-group">
                        <label for="title">Titel</label>
                        <input type="text" id="title" required placeholder="Titel på anteckning...">
                    </div>

                    <div class="form-group">
                        <label for="category">Kategori</label>
                        <input type="text" id="category" required placeholder="t.ex. DevSecOps, Möte, Kodning...">
                    </div>

                    <div class="form-group">
                        <label for="content">Innehåll</label>
                        <textarea id="content" required rows="5" placeholder="Skriv ditt dagbokinlägg här..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Spara anteckning</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">Avbryt</button>
                    </div>
                </form>
            </section>

            <section class="entries-section">
                <h2>Tidigare inlägg</h2>
                <div id="entries-container" class="entries-container">
                    <p class="loading-text">Laddar anteckningar...</p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
